name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Validate sample dataset
        run: llm-eval-lab --rubric configs/rlhf_rubric.json validate data/examples.jsonl

      - name: Generate sample reports
        run: llm-eval-lab --rubric configs/rlhf_rubric.json report data/examples.jsonl --markdown reports/sample_report.md --json reports/sample_report.json
